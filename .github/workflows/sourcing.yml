name: Weekly Automated Sourcing

on:
  schedule:
    # 毎週金曜日の18:00 JST (UTC 09:00) に実行
    - cron: '0 9 * * 5'
  # 手動実行用
  workflow_dispatch:

jobs:
  run-sourcing-agent:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        cd agent
        pip install -r requirements.txt

    - name: Decode Google Tokens
      env:
        GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}
        GOOGLE_TOKEN_B64: ${{ secrets.GOOGLE_TOKEN_B64 }}
      run: |
        cd agent
        echo "$GOOGLE_CREDENTIALS_B64" | base64 -d > credentials.json
        echo "$GOOGLE_TOKEN_B64" | base64 -d > token.json

    - name: Run Sourcing Agent
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}
      run: |
        cd agent
        python src/sourcing_agent.py
